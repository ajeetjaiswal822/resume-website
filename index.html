<!DOCTYPE html>
<html>
<head>
<title>AI Resume Formatter</title>
</head>

<body>

<h2>AI Resume Formatter by Ajeet</h2>

<form action="/upload" method="post" enctype="multipart/form-data">

Upload Resume:
<br>
<input type="file" name="resume" required>

<br><br>

Prescreen Questions (optional):
<br>
<textarea name="prescreen" rows="8" cols="80"
placeholder="Enter one question per line"></textarea>

<br><br>

<button type="submit">Format Resume</button>

</form>

</body>
</html>
